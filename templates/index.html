<!DOCTYPE html>
<html>
<head>
    <title>TrustAI</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #cae9af, #d9c3f0);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            width: 60%;
            text-align: center;
            color: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        textarea {
            width: 100%;
            height: 140px;
            border-radius: 10px;
            border: none;
            padding: 10px;
            font-size: 14px;
        }

        button {
            margin-top: 20px;
            padding: 12px 30px;
            border-radius: 8px;
            border: none;
            background: #00c6ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0072ff;
            transform: scale(1.05);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            background: rgba(255,255,255,0.2);
            animation: fadeIn 0.6s ease-in-out;
        }

        .progress {
            height: 20px;
            background: #ddd;
            border-radius: 10px;
            margin-top: 10px;
        }

        .bar {
            height: 100%;
            border-radius: 10px;
            animation: grow 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        @keyframes grow {
            from {width: 0;}
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🚀 TrustAI</h1>

    <form method="POST" onsubmit="loading()">
        <textarea name="message" placeholder="Paste job message..."></textarea><br>
        <button id="btn">Analyze</button>
    </form>

    {% if result %}
    <div class="result"
        style="
        color:
        {% if 'Scam Likely' in result %} #ff4d4d
        {% elif 'Suspicious' in result %} #ffb84d
        {% else %} #22c55e 
        {% endif %}
        ">

        <h2>Result</h2>
        <p>{{ result }}</p>

        {% set percent = result.split('(')[1].split('%')[0] | int %}

        <div class="progress">
            <div class="bar"
                 style="
                 width: {{ percent }}%;
                 background:
                 {% if percent >= 60 %} red
                 {% elif percent >= 30 %}  #f97316
                 {% else %} green
                 {% endif %}
                 ">
            </div>
        </div>

        <p>{{ percent }}% Risk</p>

    </div>
    {% endif %}

</div>

<script>
function loading() {
    let btn = document.getElementById("btn");
    btn.innerText = "Analyzing...";
}
</script>

</body>
</html>
